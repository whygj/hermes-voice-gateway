# Hermes Voice Gateway 配置文件
# 改 base_url 就能对接任何 OpenAI 兼容的 Agent

llm:
  base_url: "http://127.0.0.1:8642/v1"  # Hermes API Server (本机)
  api_key: "change-me-local-dev"         # API_SERVER_KEY
  model: "hermes-agent"                  # Hermes 的模型名

stt:
  provider: "whisper"                    # faster-whisper 本地
  model: "base"                          # tiny/base/small/medium/large
  language: "zh"                         # 中文

tts:
  provider: "kokoro"                     # Kokoro 本地 ONNX
  voice: "af_heart"                      # 语音ID
  language: "zh"                         # 中文

server:
  host: "0.0.0.0"
  port: 7860
  transport: "webrtc"                    # webrtc / websocket
